services:
  caddy:
    image: caddy:2-alpine
    container_name: pgh-pizza-caddy
    restart: unless-stopped
    depends_on:
      - frontend
    environment:
      PGH_SITE_ADDRESS: ${PGH_SITE_ADDRESS:-http://localhost}
      PGH_TLS_SERVER_NAME: ${PGH_TLS_SERVER_NAME:-localhost}
    ports:
      - "${FRONTEND_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - pgh-pizza-caddy-data:/data
      - pgh-pizza-caddy-config:/config

  postgres:
    image: postgres:16-alpine
    container_name: pgh-pizza-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PGH_POSTGRES_DB:-pgh_pizza}
      POSTGRES_USER: ${PGH_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${PGH_POSTGRES_PASSWORD:-postgres}
    expose:
      - "5432"
    volumes:
      - pgh-pizza-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: pgh-pizza-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGH_DB_URL: jdbc:postgresql://postgres:5432/${PGH_POSTGRES_DB:-pgh_pizza}
      PGH_DB_USERNAME: ${PGH_POSTGRES_USER:-postgres}
      PGH_DB_PASSWORD: ${PGH_POSTGRES_PASSWORD:-postgres}
      PGH_FRONTEND_BASE_URL: ${PGH_FRONTEND_BASE_URL:-http://localhost}
      PGH_JWT_ISSUER: ${PGH_JWT_ISSUER:-pgh-pizza-api}
      PGH_JWT_SECRET: ${PGH_JWT_SECRET:-local-development-secret-change-me-local-development-secret}
      PGH_JWT_EXPIRES_MINUTES: ${PGH_JWT_EXPIRES_MINUTES:-120}
      PGH_ADMIN_EMAIL: ${PGH_ADMIN_EMAIL:-admin@pgh-pizza.local}
      PGH_ADMIN_PASSWORD: ${PGH_ADMIN_PASSWORD:-ChangeMe123!}
      PGH_ADMIN_DISPLAY_NAME: ${PGH_ADMIN_DISPLAY_NAME:-PGH Admin}
      SERVER_ADDRESS: ${BACKEND_SERVER_ADDRESS:-0.0.0.0}
      JAVA_OPTS: ${JAVA_OPTS:-}
      SMTP_ENABLED: ${SMTP_ENABLED:-false}
      SMTP_HOST: ${SMTP_HOST:-localhost}
      SMTP_PORT: ${SMTP_PORT:-25}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_AUTH: ${SMTP_AUTH:-false}
      SMTP_STARTTLS: ${SMTP_STARTTLS:-false}
    expose:
      - "8080"
    volumes:
      - pgh-pizza-backend-logs:/app/logs

  frontend:
    build:
      context: ./frontend
    container_name: pgh-pizza-frontend
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"

volumes:
  pgh-pizza-caddy-data:
  pgh-pizza-caddy-config:
  pgh-pizza-postgres-data:
  pgh-pizza-backend-logs:
