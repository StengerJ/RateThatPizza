spring:
  application:
    name: PGH-Pizza API
  datasource:
    url: ${PGH_DB_URL:jdbc:postgresql://localhost:5432/pgh_pizza}
    username: ${PGH_DB_USERNAME:postgres}
    password: ${PGH_DB_PASSWORD:postgres}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:25}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:false}
          starttls:
            enable: ${SMTP_STARTTLS:false}

server:
  address: ${SERVER_ADDRESS:0.0.0.0}
  port: ${PORT:8080}

app:
  frontend-base-url: ${PGH_FRONTEND_BASE_URL:http://localhost:4200}
  jwt:
    issuer: ${PGH_JWT_ISSUER:pgh-pizza-api}
    secret: ${PGH_JWT_SECRET:local-development-secret-change-me-local-development-secret}
    expires-minutes: ${PGH_JWT_EXPIRES_MINUTES:120}
  admin:
    email: ${PGH_ADMIN_EMAIL:admin@pgh-pizza.local}
    password: ${PGH_ADMIN_PASSWORD:ChangeMe123!}
    display-name: ${PGH_ADMIN_DISPLAY_NAME:PGH Admin}
  mail:
    from: ${SMTP_FROM:}
    smtp-enabled: ${SMTP_ENABLED:false}
  cors:
    allowed-origins: ${PGH_CORS_ALLOWED_ORIGINS:https://pghpizza.org,https://www.pghpizza.org,http://localhost:4200,http://127.0.0.1:4200}

logging:
  file:
    name: logs/pgh-pizza-api.log
